name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "version (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build .app
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          UNIVERSAL: "1"
        run: bash scripts/build-release.sh
      - name: Compute sha256
        id: sha
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          ZIP="build/dist/TZExpand-${VERSION}.zip"
          echo "sha=$(shasum -a 256 "$ZIP" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          files: build/dist/TZExpand-${{ steps.ver.outputs.version }}.zip
      - name: Bump cask
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha }}"
          /usr/bin/sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/tzexpand.rb
          /usr/bin/sed -i '' "s/sha256 :no_check.*/sha256 \"${SHA}\"/" Casks/tzexpand.rb
          /usr/bin/sed -i '' "s/sha256 \"[a-f0-9]*\"/sha256 \"${SHA}\"/" Casks/tzexpand.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/tzexpand.rb
          git commit -m "Release v${VERSION}" || echo "no changes to commit"
          git push origin HEAD:main
